name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: compiler/package-lock.json

      - name: Install Compiler Dependencies
        working-directory: compiler
        run: npm ci

      - name: Run Strict Aura Checks
        working-directory: compiler
        run: npm run check:strict

      - name: Build VSIX
        working-directory: editor/vscode
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build-vsix.ps1
